<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>自分用・曲一覧まとめ</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- PapaParse（CSV読み込み用ライブラリ）CDN -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <h1>自分用・曲一覧まとめ</h1>
  <p style="color:#777;font-size:small;">
    好きなアーティストの曲リストを自分用にまとめてます。
  </p>
  <table id="music-table">
    <thead>
      <tr>
        <th>✔</th>
        <th>曲名</th>
        <th>アーティスト</th>
        <th>発売日</th>
      </tr>
    </thead>
    <tbody>
      <!-- ここにJavaScriptで曲リストを自動挿入 -->
    </tbody>
  </table>
  <script src="js/main.js"></script>
</body>
</html>
