<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自分用・曲一覧まとめ</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="top">
    <h1>自分用・曲一覧まとめ</h1>
  </div>
  <p>好きなアーティストの曲リストを自分用にまとめてます。</p>
  <button class="clearAllChecksBtn">チェックをオールクリア</button>
  <p>※ 表は横にスクロールできます</p>
  <div id="checklistArea">
    <div id="songChecklist"></div>
    <button class="showDiscsButton" disabled>チェックした曲が含まれるCDを見る</button>
    <div><label>
        <input type="checkbox" id="checkSubNoOnly">サブスク無しにチェック</label>を追加
      <label>　
        <input type="checkbox" id="showStyleCheck">style(再録音)を表示</label>
      <label>　
        <input type="checkbox" id="showMixCheck"> mix(リミックス)を表示</label>　
    </div>
  </div>
  <div class="table-wrapper">
    <table id="music-table">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>
  <button class="showDiscsButton" disabled>チェックした曲が含まれるCDを見る</button>
  <div id="resultArea">
    <h3>含まれるCD一覧：</h3>
    <div id="resultCdTypeFilter">
      <label><input type="radio" name="resultCdType" value="both" checked> 両方表示</label>
      <label><input type="radio" name="resultCdType" value="album"> アルバムのみ</label>
      <label><input type="radio" name="resultCdType" value="single"> シングルのみ</label>
    </div>
    <div class="table-wrapper">
      <div id="discsTable"></div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>

</html>
